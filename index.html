
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Hello Kitty</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* الخلفية */
#scene{
    position:relative;
    width:100%;
    height:100%;
    background:url("104be3a230ca00148c8b279c1395edcc.jpg") center/cover no-repeat;
}

/* هالو كيتي */
#kitty{
    position:absolute;
    width:130px;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    transition:all 1.2s ease;
    animation:bounce 1.2s infinite alternate;
    cursor:pointer;
}

/* حركة لطيفة */
@keyframes bounce{
    from{ transform:translateY(0) translateX(-50%); }
    to{ transform:translateY(-12px) translateX(-50%); }
}

/* فقاعة الكلام */
#bubble{
    position:absolute;
    bottom:150px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 15px;
    border-radius:15px;
    font-size:15px;
    display:none;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    max-width:220px;
    text-align:center;
}

/* لمسة */
#hint{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:14px;
    opacity:.8;
}
</style>
</head>

<body>

<div id="scene">

    <div id="bubble">💌</div>

    <img id="kitty" src="kitty.png">

    <div id="hint">المس هالو كيتي ✨</div>

    <audio id="song" src="EI2oxQd95z4.mp3"></audio>

</div>

<script>
const kitty = document.getElementById("kitty");
const bubble = document.getElementById("bubble");
const song = document.getElementById("song");

let started = false;

/* أماكن عشوائية */
function moveKittyRandom(){
    const maxX = window.innerWidth - 140;
    const maxY = window.innerHeight - 160;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    kitty.style.left = x + "px";
    kitty.style.top  = y + "px";
}

/* رسائل لطيفة */
const messages = [
    "أنتِ أجمل شي اليوم 💖",
    "ابتسامتك بتجنن 🌸",
    "أنا مبسوطة فيك 🥰",
    "لا تزعلـي أبداً ✨",
    "هاي بوسة إلك 😘"
];

let msgIndex = 0;

function showMessage(){
    bubble.innerText = messages[msgIndex];
    bubble.style.display="block";

    const kRect = kitty.getBoundingClientRect();

    bubble.style.left = (kRect.left + kRect.width/2) + "px";
    bubble.style.top  = (kRect.top - 50) + "px";

    msgIndex++;

    if(msgIndex >= messages.length){
        setTimeout(()=>{
            bubble.innerText="🎵 شغلت الأغنية إلك";
            song.play().catch(()=>{});
        },700);
    }
}

/* بداية العرض */
function startShow(){
    if(started) return;
    started = true;

    document.getElementById("hint").style.display="none";

    moveKittyRandom();
    showMessage();

    let moveCount = 0;

    const mover = setInterval(()=>{
        moveKittyRandom();
        showMessage();
        moveCount++;

        if(moveCount >= 6){
            clearInterval(mover);
        }

    },1400);
}

/* أول لمسة مطلوبة لتشغيل الصوت */
kitty.addEventListener("click",startShow);
kitty.addEventListener("touchstart",startShow);

</script>

</body>
</html>
