<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TM Love</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f0f0f,#1a001f);
overflow:hidden;
font-family:Arial;
color:white;
}

/* قلب كبير */
.heart{
position:relative;
width:180px;
height:180px;
background:#ff0033;
transform:rotate(-45deg) scale(0);
animation:draw 1.5s forwards, beat 1.2s infinite 1.5s;
box-shadow:0 0 40px #ff0033;
}

.heart:before,
.heart:after{
content:"";
position:absolute;
width:180px;
height:180px;
background:#ff0033;
border-radius:50%;
}

.heart:before{
top:-90px;
left:0;
}

.heart:after{
left:90px;
top:0;
}

/* النص */
.text{
position:absolute;
transform:rotate(45deg);
font-size:38px;
font-weight:bold;
top:60px;
left:40px;
display:flex;
align-items:center;
gap:10px;
}

/* قلب صغير */
.miniheart{
color:#ff3366;
font-size:35px;
animation:glow 1.5s infinite alternate;
}

/* السهم */
.arrow{
position:absolute;
width:200px;
height:4px;
background:white;
top:90px;
left:-10px;
transform:rotate(25deg);
}

.arrow:after{
content:"";
position:absolute;
right:-10px;
top:-6px;
border-left:15px solid white;
border-top:8px solid transparent;
border-bottom:8px solid transparent;
}

/* قلوب تطير */
.floating{
position:absolute;
color:#ff4d6d;
animation:float 6s linear infinite;
opacity:0.7;
}

/* انيميشن */

@keyframes draw{
0%{transform:rotate(-45deg) scale(0);}
100%{transform:rotate(-45deg) scale(1);}
}

@keyframes beat{
0%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.15);}
100%{transform:rotate(-45deg) scale(1);}
}

@keyframes glow{
from{ text-shadow:0 0 5px #ff6699;}
to{ text-shadow:0 0 20px #ff0033;}
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="heart">
<div class="arrow"></div>
<div class="text">
T <span class="miniheart">❤</span> M
</div>
</div>

<script>

/* قلوب تطير بالخلفية */

function createHeart(){
const heart=document.createElement("div");
heart.className="floating";
heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},8000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
