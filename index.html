<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى جنى.. الوحيدة في قلبي 💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe4e1 100%);
            color: #4a4a4a;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 20px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(255, 182, 193, 0.4);
            border: 1px solid #ffd1dc;
            text-align: center;
        }

        h1 {
            font-family: 'Amiri', serif;
            color: #ff4d6d;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        /* تنسيق مشغل اليوتيوب ليكون مثل الصورة */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            border: 8px solid #cc0000; /* إطار أحمر زي الصورة */
            margin: 25px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .poem-card {
            background: #fffafa;
            border-right: 6px solid #ff4d6d;
            padding: 20px;
            margin: 20px 0;
            font-family: 'Amiri', serif;
            font-size: 1.5em;
            line-height: 1.6;
            color: #222;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            height: 60px;
            position: relative;
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s ease;
        }

        .btn-yes {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
        }

        .btn-no {
            background: #f0f0f0;
            color: #aaa;
            position: absolute;
        }

        #success {
            display: none;
            font-size: 1.5em;
            color: #ff4d6d;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <h1>إلى جنى.. عمري ❤️</h1>
        
        <p>أكتر من اللي أنا بحلم بيه.. مش قادرة أخبّي أنا حاسّة إيه</p>

        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/El2oxQd95z4" 
                title="Assala - Aktar" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="poem-card">
            فـأنتِ المَـدا، وأنتِ السَّـنا، وأنتِ العُـمرُ <br>
            خُـذي الوعـدَ مِني، لا بـديلَ لـحبِّـنا
        </div>

        <p style="font-weight: bold; color: #ff4d6d;">هل تصفحين عن معتصم؟ 🥺</p>

        <div class="btn-group">
            <button class="btn btn-yes" onclick="accepted()">سامحتك يا معتصم</button>
            <button class="btn btn-no" id="no-btn" onmouseover="escape()">لا، لسه زعلانة</button>
        </div>
    </div>

    <div id="success" class="container" style="display:none;">
        <h1>شكراً يا جنى! ❤️</h1>
        <p>وعد من معتصم: رح أحبك للأبد.</p>
        <div class="heart-icon" style="font-size: 100px;">💖</div>
    </div>

    <script>
        const TOKEN = '8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY';
        const CHAT_ID = '8115519784';

        function escape() {
            const btn = document.getElementById('no-btn');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function accepted() {
            document.getElementById('card').style.display = 'none';
            document.getElementById('success').style.display = 'block';

            // إرسال الإشعار لتليجرام
            fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent("🎉 مبروك! جنى سامحتك وشافت الفيديو ❤️")}`);
            
            // تأثير القلوب
            for(let i=0; i<30; i++) {
                setTimeout(createHeart, i * 100);
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = '25px';
            heart.style.animation = `float ${Math.random() * 2 + 2}s linear forwards`;
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        const style = document.createElement('style');
        style.innerHTML = `@keyframes float { to { transform: translateY(-110vh); opacity: 0; } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
