
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيلاف ❤️</title>
    <style>
        body { 
            /* الخلفية اللي اخترتها مع تثبيتها */
            background-image: url('https://i.ibb.co/hR0V6vB0/1000101751.jpg'); 
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        /* كيتي المجسمة الجديدة (كأيقونة 3D) */
        #kittyIcon {
            position: fixed !important;
            bottom: 15px !important;
            right: 15px !important;
            width: 110px !important; /* حجم مثالي كأيقونة */
            z-index: 999999 !important;
            animation: floating3D 3s infinite ease-in-out;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3)); /* ظل يعطي عمق للمجسم */
            pointer-events: auto;
            cursor: pointer;
        }

        @keyframes floating3D {
            0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
            50% { transform: translateY(-25px) rotate(3deg) scale(1.05); }
        }

        .main-card {
            max-width: 380px;
            width: 85%;
            background: rgba(255, 255, 255, 0.95); /* جعل الكرت شفاف قليلاً ليعطي جمالية */
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 45px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 2px solid #ffd1dc;
            position: relative;
            z-index: 10;
        }

        .player-box { background: #cc0000; border-radius: 20px; padding: 12px; margin: 20px 0; border: 5px solid #a00000; }
        iframe { width: 100%; height: 85px; border: none; border-radius: 12px; }
        
        .btn-promise { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1em;
            box-shadow: 0 8px 15px rgba(255, 77, 109, 0.3);
        }

        /* الورد المتساقط */
        .rose { position: absolute; top: -20px; z-index: 1; animation: fall 4s linear infinite; font-size: 22px; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <img id="kittyIcon" src="https://i.ibb.co/3ykpY6v9/1000101754.png" alt="3D Kitty Icon" onclick="alert('إيلاف.. معتصم بموت فيكي ودايماً بيفكر فيكي! ✨')">

    <div class="main-card">
        <h1 style="color: #ff4d6d; font-family: 'Amiri'; margin: 0; font-size: 2.2em;">إلى إيلاف.. قلبي ❤️</h1>
        <div class="player-box">
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>
        <p style="color: #555;">معتصم بيوثق فيكي ثقة عمياء.. ❤️</p>
        <p style="font-weight:bold; color:#d63384; margin-bottom: 20px;">أوعديه تضلي مخلصة إله ولحبكم للأبد؟ 🥺</p>
        <button class="btn-promise" onclick="sendToTelegram()">أوعدك يا معتصم ❤️</button>
    </div>

    <script>
        setInterval(() => {
            const r = document.createElement('div');
            r.className = 'rose';
            r.innerHTML = '🌸';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 4000);
        }, 300);

        function sendToTelegram() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("إيلاف وعدتك يا معتصم وكيتي المجسمة شاهدة! 😂❤️")}`);
            alert("أحلى وعد! وصلت الرسالة لمعتصم ❤️");
        }
    </script>
</body>
</html>
