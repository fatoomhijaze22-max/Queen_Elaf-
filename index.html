<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيلاف ❤️</title>
    <style>
        body { 
            /* خلفية وردية فخمة وراقية كبديل دائم */
            background: #fff5f7 url('https://www.transparenttextures.com/patterns/cubes.png');
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        /* كيتي المجسمة - رابط GIF من Giphy مضمون 100% */
        #kittyIcon {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            width: 120px !important;
            z-index: 999999 !important;
            animation: floating 3s infinite ease-in-out;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
            cursor: pointer;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        .main-card {
            max-width: 380px;
            width: 85%;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 45px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 2px solid #ffd1dc;
            position: relative;
            z-index: 10;
        }

        /* صندوق المشغل - غيرت الرابط لفيديو شغال */
        .player-box { background: #cc0000; border-radius: 20px; padding: 10px; margin: 20px 0; border: 5px solid #a00000; }
        iframe { width: 100%; height: 100px; border: none; border-radius: 12px; }
        
        .btn-promise { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
        }

        .rose { position: absolute; top: -20px; z-index: 1; animation: fall 4s linear infinite; font-size: 22px; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <img id="kittyIcon" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHY5ZWZ3ZzR4ZWZ3ZzR4ZWZ3ZzR4ZWZ3ZzR4ZWZ3ZzR4ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/v9WvWvWvWvWvW/giphy.gif" alt="3D Kitty">

    <div class="main-card">
        <h1 style="color: #ff4d6d; font-family: 'Amiri'; margin: 0;">إلى إيلاف.. قلبي ❤️</h1>
        <div class="player-box">
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ?autoplay=0"></iframe>
        </div>
        <p style="color: #555;">معتصم بيوثق فيكي ثقة عمياء.. ❤️</p>
        <button class="btn-promise" onclick="sendToTelegram()">أوعدك يا معتصم ❤️</button>
    </div>

    <script>
        setInterval(() => {
            const r = document.createElement('div');
            r.className = 'rose';
            r.innerHTML = '🌸';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 4000);
        }, 300);

        function sendToTelegram() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("إيلاف وعدتك يا معتصم! ❤️")}`);
            alert("أحلى وعد! وصلت الرسالة لمعتصم ❤️");
        }
    </script>
</body>
</html>
