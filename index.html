
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيلاف ❤️</title>
    <style>
        body { 
            /* رابط خلفية موثوق ودائم */
            background-image: url('https://i.pinimg.com/originals/90/73/41/90734107147e8705f99274296996d19e.jpg'); 
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            overflow: hidden; 
            position: relative; 
        }

        /* كيتي المجسمة الأيقونة */
        #kittyIcon {
            position: fixed !important;
            bottom: 15px !important;
            right: 15px !important;
            width: 100px !important;
            z-index: 999999 !important;
            animation: floating3D 3s infinite ease-in-out;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.3));
            cursor: pointer;
        }

        @keyframes floating3D {
            0%, 100% { transform: translateY(0) rotate(-3deg) scale(1); }
            50% { transform: translateY(-20px) rotate(3deg) scale(1.1); }
        }

        .main-card {
            max-width: 380px;
            width: 85%;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 45px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 2px solid #ffd1dc;
            z-index: 10;
        }

        .player-box { background: #cc0000; border-radius: 20px; padding: 10px; margin: 20px 0; border: 5px solid #a00000; }
        iframe { width: 100%; height: 85px; border: none; border-radius: 12px; }
        
        .btn-promise { 
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3); 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 50px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.1em;
            cursor: pointer;
        }

        /* الورد المتساقط */
        .rose { position: absolute; top: -20px; z-index: 1; animation: fall 4s linear infinite; font-size: 22px; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <img id="kittyIcon" src="https://assets.stickpng.com/images/580b57fbd9996e24bc43bb92.png" alt="3D Kitty">

    <div class="main-card">
        <h1 style="color: #ff4d6d; font-family: 'Amiri'; margin: 0;">إلى إيلاف.. قلبي ❤️</h1>
        <div class="player-box">
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>
        <p>معتصم بيوثق فيكي ثقة عمياء.. ❤️</p>
        <button class="btn-promise" onclick="sendToTelegram()">أوعدك يا معتصم ❤️</button>
    </div>

    <script>
        setInterval(() => {
            const r = document.createElement('div');
            r.className = 'rose';
            r.innerHTML = '🌸';
            r.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(r);
            setTimeout(() => r.remove(), 4000);
        }, 300);

        function sendToTelegram() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("إيلاف وعدتك يا معتصم! ❤️")}`);
            alert("وصلت الرسالة لمعتصم ❤️");
        }
    </script>
</body>
</html>
