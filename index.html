<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى إيلاف.. قلبي ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Cairo:wght@400;700&display=swap');

        body {
            font-family: 'Cairo', sans-serif;
            background: #fff5f7;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* تأثير الورد المتساقط */
        .rose {
            position: absolute;
            color: #ffb6c1;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* كيتي كأنها مجسم 3D متحرك */
        .kitty-3d {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 80px; /* حجم صغير عشان ما تغطي الكلام */
            z-index: 2000;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.2)); /* تأثير الظل ليعطي عمق 3D */
            animation: float3D 3s ease-in-out infinite;
            cursor: pointer;
        }

        @keyframes float3D {
            0%, 100% { transform: translateY(0) rotateY(0deg) scale(1); }
            50% { transform: translateY(-20px) rotateY(20deg) scale(1.1); }
        }

        .container {
            max-width: 400px;
            width: 90%;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            text-align: center;
            border: 2px solid #ffd1dc;
            z-index: 10;
        }

        .player-card {
            background: #cc0000;
            border-radius: 15px;
            padding: 10px;
            margin: 15px 0;
            border: 4px solid #a00000;
        }

        iframe { width: 100%; height: 80px; border-radius: 10px; border: none; }

        .btn-love {
            background: #ff4d6d;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 20; i++) {
            let rose = document.createElement('div');
            rose.className = 'rose';
            rose.innerHTML = '🌸';
            rose.style.left = Math.random() * 100 + 'vw';
            rose.style.animationDuration = (Math.random() * 3 + 2) + 's';
            rose.style.delay = Math.random() * 5 + 's';
            document.body.appendChild(rose);
        }
    </script>

    <div class="kitty-3d" onclick="alert('إيلاف.. معتصم بيحبك وبيهتم فيكي!')">
        <img src="https://media.tenor.com/g9f5z3k0s6AAAAAC/hello-kitty-kiss.gif" style="width: 100%;" alt="3D Kitty">
    </div>

    <div class="container">
        <h1 style="color: #ff4d6d; font-family: 'Amiri'; margin: 0;">إلى إيلاف.. قلبي ❤️</h1>
        
        <div class="player-card">
            <div style="color:white; font-size: 0.8em; margin-bottom:5px;">🎵 محمود التركي - حبيبي هو</div>
            <iframe src="https://www.youtube.com/embed/SshsX6YI2jQ"></iframe>
        </div>

        <p style="font-size: 0.9em; color: #555;">معتصم بيوثق فيكي أكثر من أي شي في الدنيا..</p>
        <p style="font-weight: bold; color: #d63384;">أوعديه تضلي مخلصة إله ولحبكم؟ 🥺</p>

        <button class="btn-love" onclick="sendPromise()">أوعدك يا معتصم ❤️</button>
    </div>

    <script>
        function sendPromise() {
            fetch(`https://api.telegram.org/bot8345183828:AAEqq2_V3Xu9x0hrk7rTVfl_489VFCW3YGY/sendMessage?chat_id=8115519784&text=${encodeURIComponent("🎉 إيلاف شافت الموقع ووعدتك تضل مخلصة! ❤️")}`);
            alert("أحلى وعد بالدنيا! وصلت الرسالة لمعتصم ❤️");
        }
    </script>
</body>
</html>
