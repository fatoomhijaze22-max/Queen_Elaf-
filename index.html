<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TM Heart</title>
<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:black;
}

.heart{
width:150px;
height:150px;
background:red;
position:relative;
transform:rotate(-45deg);
animation:beat 1s infinite;
}

.heart:before,
.heart:after{
content:"";
width:150px;
height:150px;
background:red;
border-radius:50%;
position:absolute;
}

.heart:before{
top:-75px;
left:0;
}

.heart:after{
left:75px;
top:0;
}

.text{
position:absolute;
color:white;
font-size:30px;
transform:rotate(45deg);
top:50px;
left:40px;
font-weight:bold;
}

@keyframes beat{
0%{transform:rotate(-45deg) scale(1);}
50%{transform:rotate(-45deg) scale(1.2);}
100%{transform:rotate(-45deg) scale(1);}
}
</style>
</head>

<body>

<div class="heart">
<div class="text">T.M</div>
</div>

</body>
</html>
